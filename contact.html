<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Battersea Roofing</title>
    <link rel="stylesheet" href="styles.css"> <!-- Optional link to CSS -->
</head>
<body>
    <header>
        <h1>Contact Battersea Roofing</h1>
    </header>

    <section>
        <h2>Get in Touch</h2>
        <form action="#" method="POST">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="4" required></textarea>

            <button type="submit">Submit</button>
        </form>
    </section>

    <section>
        <h2>Call Us</h2>
        <p>For immediate assistance, call us at: <strong>(123) 456-7890</strong></p>
    </section>

    <section>
        <h2>Service Areas</h2>
        <p>We are proud to serve the following areas:</p>
        <ul>
            <li>Battersea</li>
            <li>Clapham</li>
            <li>Wandsworth</li>
            <li>Putney</li>
        </ul>
    </section>

    <section>
        <h2>Find Us</h2>
        <div id="map-placeholder">
            <!-- Placeholder for map -->
            <p>[Map Placeholder]</p>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Battersea Roofing. All rights reserved.</p>
    </footer>
</body>
</html>
